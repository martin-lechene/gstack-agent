name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: python -m pip install --upgrade pip
      - name: Fetch all remote branches
        run: git fetch --prune --no-tags origin '+refs/heads/*:refs/remotes/origin/*'
      - name: Validate branches and artifacts
        run: python scripts/validate_branches.py
      - name: Validate Python syntax
        run: python -m py_compile scripts/validate_branches.py
      - name: Validate shell scripts
        run: bash -n install.sh
      - name: Validate compiled Python files
        run: python -m compileall .
